name: PR Test Build Path Filter
description: Run path filtering with mhabit platform categories for PR test builds

inputs:
  token:
    description: GitHub token with read access
    required: true
  base:
    description: Base SHA for diff comparison
    required: true
  ref:
    description: Head/PR SHA for diff comparison
    required: true

outputs:
  common:
    description: Whether common/shared paths changed
    value: ${{ steps.filter.outputs.common }}
  android:
    description: Whether Android-specific paths changed
    value: ${{ steps.filter.outputs.android }}
  ios:
    description: Whether iOS-specific paths changed
    value: ${{ steps.filter.outputs.ios }}
  linux:
    description: Whether Linux-specific paths changed
    value: ${{ steps.filter.outputs.linux }}
  macos:
    description: Whether macOS-specific paths changed
    value: ${{ steps.filter.outputs.macos }}

runs:
  using: composite
  steps:
    - name: Filter paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        token: ${{ inputs.token }}
        base: ${{ inputs.base }}
        ref: ${{ inputs.ref }}
        filters: |
          common:
            - 'pubspec.yaml'
            - 'pubspec.lock'
            - 'packages/**'
            - 'lib/**'
            - 'assets/**'
          android:
            - 'android/**'
          ios:
            - 'ios/**'
          linux:
            - 'linux/**'
          macos:
            - 'macos/**'
