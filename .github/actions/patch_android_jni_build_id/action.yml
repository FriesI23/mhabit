name: Patch Android JNI Build ID
description: work around issue #543 by disabling non-deterministic JNI linker build IDs in Android builds.

runs:
  using: composite
  steps:
    # Work around https://github.com/FriesI23/mhabit/issues/543.
    # `libdartjni.so` picks up a non-reproducible linker build id unless the
    # cached jni package injects `--build-id=none` into its native linker flags.
    - name: Patch JNI build id for reproducible Android builds
      run: |
        # Patch the cached jni package before Android builds so repeated CI
        # rebuilds produce identical JNI native library outputs.
        shopt -s nullglob
        pub_cache_root="${PUB_CACHE:-$HOME/.pub-cache}"
        jni_cmake_files=("$pub_cache_root"/hosted/*/jni-*/src/CMakeLists.txt)
        if [[ ${#jni_cmake_files[@]} -eq 0 ]]; then
          echo "No jni CMakeLists.txt found under $pub_cache_root"
          exit 1
        fi
        for jni_cmake_file in "${jni_cmake_files[@]}"; do
          echo "Patching $jni_cmake_file"
          mapfile -t before_matches < <(grep -n -- '-Wl,' "$jni_cmake_file" || true)
          sed -i -E \
            -e 's/-Wl,(--build-id=none,)*/-Wl,--build-id=none,/g' \
            "$jni_cmake_file"
          for before_match in "${before_matches[@]}"; do
            line_number="${before_match%%:*}"
            before_line="${before_match#*:}"
            after_line=$(sed -n "${line_number}p" "$jni_cmake_file")
            printf '  %s:%s -> %s\n' "$line_number" "$before_line" "$after_line"
          done
        done
        missing_patches=$(grep -L -- '--build-id=none' "${jni_cmake_files[@]}" || true)
        if [[ -n "$missing_patches" ]]; then
          echo "Failed to patch:"
          echo "$missing_patches"
          exit 1
        fi
      shell: bash
