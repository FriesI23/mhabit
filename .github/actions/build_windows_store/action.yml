name: Build Windows (Store MSIX)
description: >
  Build the f_store flavor MSIX for Microsoft Store submission by running
  the same scripts/build_msix_store.cmd a developer would run locally, so
  the Store identity parameters (--identity-name/--publisher/etc.) live in
  one place instead of being duplicated between this action and the
  script. Unlike the GitHub Release MSIX, Store packages are not locally
  signed: with --store, the msix tool skips signing entirely because the
  Microsoft Store re-signs the package on ingestion. No signing secret
  input is needed here.
  Build output is located in `build\windows\x64\runner\Release`.

outputs:
  msix-path:
    description: Path to generated Store MSIX file
    value: ${{ steps.output.outputs.msix-path }}

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup_flutter
    - name: Build Store MSIX
      run: scripts\build_msix_store.cmd
      shell: cmd
    - id: output
      run: |
        shopt -s nullglob
        matches=(build/windows/x64/runner/Release/mhabit_*_store.msix)
        if [ "${#matches[@]}" -ne 1 ]; then
          echo "Expected exactly one Store MSIX, found ${#matches[@]}: ${matches[*]}" >&2
          exit 1
        fi
        OUTPUT_PATH="${matches[0]}"
        md5sum "$OUTPUT_PATH"
        echo "msix-path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"
      shell: bash
