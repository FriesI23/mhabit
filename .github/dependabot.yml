version: 2
updates:
  # Actions used across CI/release workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # fastlane's own Ruby toolchain (cocoapods/dotenv/etc.), not a project dependency
  - package-ecosystem: "bundler"
    directory: "/ios"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
  - package-ecosystem: "bundler"
    directory: "/android"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
  - package-ecosystem: "bundler"
    directory: "/macos"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
