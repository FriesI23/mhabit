name: Build Test Linux Bundle

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref/sha to checkout (defaults to the calling workflow's own ref)
        type: string
        required: false
        default: ''
      environment:
        description: GitHub environment the build job runs under
        type: string
        required: true
    outputs:
      artifact-url:
        description: URL of the uploaded linux bundle artifact
        value: ${{ jobs.build.outputs.artifact-url }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup_flutter
      - id: build
        uses: ./.github/actions/build_linux
      - id: upload
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle-x64
          path: ${{ steps.build.outputs.path }}
          if-no-files-found: error
          retention-days: 1
