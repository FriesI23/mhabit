name: Submit macOS (App Store)

on:
  workflow_call:
    inputs:
      track:
        description: >
          TestFlight track or "public" for an App Store submission
        type: string
        required: false
        default: internal
      dry_run:
        description: >
          Run as a verify_only/no-op dry run instead of a real submission
        type: boolean
        required: false
        default: false

jobs:
  submit-macos-app-store:
    name: "Submit macOS (App Store ${{ inputs.track }})"
    runs-on: macos-latest
    environment: store-submission
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup_xcode
      - uses: ./.github/actions/setup_flutter
      - uses: ./.github/actions/setup_ruby
        with:
          working-directory: macos
      - name: Deploy to App Store
        env:
          TRACK: ${{ inputs.track }}
          DRY_RUN: ${{ inputs.dry_run }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: "true"
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
        run: |
          cd macos
          bundle exec fastlane mac deploy \
            track:"$TRACK" build:true force_build:false \
            dry_run:"$DRY_RUN"
        shell: bash
