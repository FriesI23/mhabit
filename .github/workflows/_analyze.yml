name: Analyze CI

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup_flutter
      - name: Analyze Dart
        uses: FriesI23/github-actions-analyze-dart@v5.1.0
        with:
          ignore-suffixes: '.g.dart|.gen.dart|.mock.dart'
